<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シンプルデザイン | NICE NAIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div style="width:40px"></div>
  <div class="header-logo">
    <span style="font-family:'Playfair Display',serif;font-size:20px;letter-spacing:0.1em;color:#c06080">NICE NAIL</span>
  </div>
  <div style="width:40px"></div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-img-wrap">
    <img id="hero-img" src="" alt="ヒーロー画像">
  </div>
</section>

<div class="divider"></div>

<!-- BASE DESIGNS -->
<section class="sec">
  <div class="sec-title"><span>選べる3つのベースデザイン</span></div>
  <div class="base-list" id="base-list"></div>
</section>

<div class="divider"></div>

<!-- OPTIONS -->
<section class="sec">
  <div class="options-wrap">
    <div class="options-header">
      <div style="font-size:28px">♡</div>
      <div class="options-header-text">
        <h3>オプションで<span>もっと可愛く</span></h3>
        <p>ストーンやアートを追加して<br>自分だけのデザインにカスタムできます。</p>
      </div>
    </div>
    <!-- 料金帯 pill -->
    <div class="option-price-pills">
      <div class="option-price-pill">
        <div class="option-price-pill-dot"></div>
        <span>¥110</span>
      </div>
      <div class="option-price-divider">·</div>
      <div class="option-price-pill">
        <div class="option-price-pill-dot" style="background:var(--pink)"></div>
        <span>¥330</span>
      </div>
      <div class="option-price-divider">·</div>
      <div class="option-price-pill">
        <div class="option-price-pill-dot" style="background:var(--pink-dark)"></div>
        <span>¥550</span>
      </div>
    </div>

    <div class="sec-title" style="font-size:13px;margin-bottom:16px;"><span>今月のおすすめオプション（一例）</span></div>
    <div class="options-grid" id="options-grid"></div>
    <div style="text-align:center;margin-top:14px;">
      <span class="option-monthly-badge" id="monthly-badge"></span>
    </div>
    <button onclick="openPop()" class="btn-option-list">オプション一覧を見る <span style="font-size:18px">›</span></button>
  </div>
</section>

<div class="divider"></div>

<!-- COMBO -->
<section class="sec">
  <div class="sec-title"><span>オプション組み合わせ例</span></div>
  <div class="combo-scroll" id="combo-scroll"></div>
  <div class="combo-desc" id="combo-desc"></div>
</section>

<div class="divider"></div>

<!-- INFO -->
<section class="sec">
  <div class="info-grid">
    <div class="info-card">
      <div class="info-card-title">🌸 こんな方におすすめ</div>
      <ul class="check-list" id="recommend-list"></ul>
    </div>
    <div class="info-card">
      <div class="info-card-title">💬 よくあるご質問</div>
      <div class="faq-list" id="faq-list"></div>
      <p class="faq-contact">その他のご質問はお気軽にお問い合わせください。</p>
    </div>
  </div>
</section>

<!-- FOOTER -->
<section class="footer-cta">
  <div class="footer-cta-text" id="footer-text"></div>
  <div class="footer-cta-sub">今すぐあなたのデザインを見つけましょう ♡</div>
</section>

<!-- POP MODAL -->
<div class="pop-modal" id="pop-modal">
  <button class="pop-modal-close" onclick="closePop()">✕</button>
  <div class="pop-modal-inner" id="pop-inner">
    <img class="pop-modal-img" id="pop-img" src="" alt="オプション一覧">
  </div>
  <div class="pop-modal-hint">ピンチで拡大・縮小できます</div>
</div>

<script src="script.js"></script>
</body>
</html>
